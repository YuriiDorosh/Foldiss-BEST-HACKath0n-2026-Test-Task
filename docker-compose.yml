version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Foldiss UAV — Root docker-compose
#
# Manages: RabbitMQ, Parser Worker, AI Worker, Frontend
# Odoo + PostgreSQL are managed separately via odoo/Makefile
#
# Prerequisites:
#   docker network create backend
#   Odoo stack running: cd odoo && make up-all
#
# Artifacts layout (bind-mounted, persisted locally):
#   artifacts/models/   — HuggingFace model weights (~3 GB)
#   artifacts/lora/     — LoRA fine-tune adapter (written by finetune.py)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Message Broker ──────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"    # AMQP — used by Odoo, parser, AI worker
      - "15672:15672"  # Management UI — http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Parser Worker ───────────────────────────────────────────────────────────
  parser:
    build:
      context: ./parser
      dockerfile: Dockerfile
    container_name: parser
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      ODOO_URL: ${ODOO_URL}
      ODOO_DB: ${ODOO_DB}
      ODOO_USER: ${ODOO_USER}
      ODOO_PASSWORD: ${ODOO_PASSWORD}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  # ── AI Worker ───────────────────────────────────────────────────────────────
  ai_worker:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: ai_worker
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      ODOO_URL: ${ODOO_URL}
      ODOO_DB: ${ODOO_DB}
      ODOO_USER: ${ODOO_USER}
      ODOO_PASSWORD: ${ODOO_PASSWORD}
      AI_BASE_MODEL: ${AI_BASE_MODEL:-Qwen/Qwen2.5-1.5B-Instruct}
      LORA_ADAPTER_PATH: /adapters/uav_lora
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-200}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      HF_HOME: /model_cache          # HF looks for models in /model_cache/hub/
      HF_HUB_OFFLINE: "1"            # never call huggingface.co — use artifacts/
      TRANSFORMERS_OFFLINE: "1"
    volumes:
      - ./artifacts/models:/model_cache   # model weights — persisted locally
      - ./artifacts/lora:/adapters        # LoRA adapter — written by finetune.py
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  # ── Frontend (React + Plotly.js) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_ODOO_URL: ""                                          # empty = same-origin; nginx proxies /uav/* → odoo:8069
        VITE_ODOO_EXTERNAL_URL: ${VITE_ODOO_EXTERNAL_URL:-""}
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:80"   # http://localhost:3000
    networks:
      - backend

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  rabbitmq_data:    # RabbitMQ durable queue state

networks:
  backend:
    external: true   # created by: docker network create backend
